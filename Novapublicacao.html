<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumen - Nova Publicação</title>
    
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/novapublicacao.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="topbar">
    <div class="brand-side">
        <img src="../img/LogoLumen2.svg" class="logo-img" alt="Logo">
    </div>

    <nav>
        <a href="home.html">home</a>
        <a href="comunidades.html" class="active">comunidades</a>
        <a href="Agenda.html">agenda</a>
    </nav>

    <div class="divisao-header">
        <div class="pesquisa">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Procurar..." />
        </div>

        <div class="notif">
            <i class="fa-regular fa-bell icon-bell"></i>
            <span class="badge" id="badgeNotif">0</span>
            <div class="dropdown" id="dropdownNotificacao">
                <div class="dropdown-header">Notificações</div>
                <div class="empty" id="emptyNotif">Você não possui notificações</div>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="user-menu">
            <div class="user-trigger">
                <i class="fa-regular fa-circle-user avatar"></i>
                <span class="username">João A B</span>
            </div>
            <div class="user-dropdown" id="userDropdown">
                <div class="user-info">
                    <i class="fa-regular fa-circle-user avatar"></i>
                    <span>João A B</span>
                </div>
                <div class="user-item"><i class="fa-solid fa-gear"></i><span>Configurações</span></div>
                <div class="user-item" id="btnSair"><i class="fa-solid fa-right-from-bracket"></i><span>Sair</span></div>
            </div>
        </div>
    </div>
</header>

<main class="main-content">
    <div class="post-card">
        <div class="header-badge">
            <span>Fazer publicação</span>
        </div>

        <div class="input-group">
            <label for="desc">Descrição</label>
            <textarea id="desc" placeholder="No que você está pensando?"></textarea>
        </div>

        <div class="input-group">
            <label>Adicionar mídia</label>
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
            
            <div class="media-upload" id="dropArea">
                <button id="btnRemoveImage" class="remove-image-btn" title="Remover imagem">
                    <i class="fa-solid fa-xmark"></i>
                </button>

                <div class="upload-content" id="uploadContent">
                    <div class="upload-icon">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 3H5C3.89 3 3 3.9 3 5V19C3 20.1 3.89 21 5 21H19C20.11 21 21 20.1 21 19V5C21 3.9 20.11 3 19 3ZM19 19H5V5H19V19ZM13.96 12.29L11.21 15.83L9.25 13.47L6.5 17H17.5L13.96 12.29Z" fill="#CCCCCC"/>
                        </svg>
                    </div>
                </div>
                <img src="" id="imagePreview">
            </div>
        </div>

        <button class="btn-postar" id="btnPostar">Postar</button>
    </div>
</main>

<script src="js/novapublicacao.js"></script>
</body>
</html>
