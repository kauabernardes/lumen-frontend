<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta - Lumen</title>
    <link rel="stylesheet" href="css/CriarCont.css" />
  </head>
  <body>
    <div class="background-pattern">
      <div class="main-container">
        <div class="brand-side">
          <img src="img/logoLumen.svg" alt="Lumen Logo" class="logo-img" />
        </div>

        <div class="login-card">
          <h2>Criar Conta</h2>

          <form onsubmit="handleRegister(event)">
            <div class="input-group">
              <label>Nome de Usuário:</label>
              <input type="text" id="username" placeholder="MariaSilva29" />
              <span class="error-message" id="usernameError"></span>
            </div>

            <div class="input-group">
              <label>E-mail:</label>
              <input type="email" id="email" placeholder="maria@gmail.com" />
              <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-group">
              <label>Senha:</label>
              <input type="password" id="password" placeholder="••••••••••••" />
              <span class="error-message" id="passwordError"></span>
            </div>

            <div class="input-group">
              <label>Confirmar Senha:</label>
              <input
                type="password"
                id="confirmPassword"
                placeholder="••••••••••••"
              />
              <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <p class="subtitle">
              Já tem uma conta? <a href="telalogin.html">Entrar</a>
            </p>

            <button type="submit" class="btn-login">Cadastrar</button>
          </form>
        </div>
      </div>
    </div>

    <script src="js/CriarCont.js"></script>
  </body>
</html>
