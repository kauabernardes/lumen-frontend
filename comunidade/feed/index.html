<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen | Loucos do ENEM</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link rel="stylesheet" href="../../css/loadingSkeleton.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-side">
        <img src="../../img/LogoLumen2.svg" alt="Lumen Logo" class="logo-img" />
      </div>

      <nav>
        <a href="../../home.html">home</a>
        <a href="../../comunidades.html" class="active">comunidades</a>
        <a href="../../Agenda.html">agenda</a>
      </nav>

      <div class="divisao-header">
        <div class="pesquisa">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Procurar..." />
        </div>

        <div class="notif">
          <i class="fa-regular fa-bell icon-bell"></i>
          <span class="badge" id="badgeNotif">2</span>
          <div class="dropdown" id="dropdownNotificacao">
            <div class="dropdown-header">Notificações</div>
            <div class="item">
              <span class="dot"></span>
              <p>Alguém curtiu seu conteúdo</p>
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="user-menu">
          <div class="user-trigger">
            <i class="fa-regular fa-circle-user avatar"></i>
            <span class="username">João A B</span>
          </div>
        </div>
      </div>
    </header>

    <div class="main-wrapper">
      <div class="container-comunidade">
        <aside class="sidebar">
          <a href="javascript:history.back();" class="btn-voltar"
            ><i class="fa-solid fa-arrow-left"></i> Voltar</a
          >

          <div class="card-info"></div>

          <div class="ad-sidebar">
            <img
              src="../../img/promoengov.webp"
              alt="Anúncio Engov"
              class="ad-image"
            />
          </div>
        </aside>

        <main class="feed">
          <button class="btn-postar" onclick="newPost()">
            Fazer nova publicação
          </button>
          <div class="timeline" id="timeline-posts"></div>
        </main>
      </div>
    </div>

    <script src="../../js/api/client.js"></script>
    <script src="../../js/api/services/authService.js"></script>
    <script src="../../js/api/services/communityService.js"></script>
    <script src="../../js/api/services/postService.js"></script>

    <script src="./main.js"></script>
    <script src="../../js/header.js"></script>
  </body>
</html>
