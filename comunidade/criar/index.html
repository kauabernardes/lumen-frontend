<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen | Criar Comunidade</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../../css/header.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-side">
        <img src="../../img/LogoLumen2.svg" alt="Lumen Logo" class="logo-img" />
      </div>

      <nav>
        <a href="/home.html">home</a>
        <a href="/comunidade/" class="active">comunidades</a>
        <a href="../../Agenda.html">agenda</a>
      </nav>

      <div class="divisao-header">
        <div class="pesquisa">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Procurar..." />
        </div>

        <div class="notif">
          <i class="fa-regular fa-bell icon-bell"></i>
          <span class="badge" id="badgeNotif">0</span>

          <div class="dropdown" id="dropdownNotificacao">
            <div class="dropdown-header">Notificações</div>

            <div class="empty" id="emptyNotif">
              Você não possui notificações
            </div>

            <div class="item">
              <span class="dot"></span>
              <p>Alguém curtiu seu conteúdo</p>
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="user-menu">
          <div class="user-trigger">
            <i class="fa-regular fa-circle-user avatar"></i>
            <span class="username">João A B</span>
          </div>

          <div class="user-dropdown" id="userDropdown">
            <div class="user-info">
              <i class="fa-regular fa-circle-user avatar"></i>
              <span>João A B</span>
            </div>

            <div class="user-item">
              <i class="fa-solid fa-gear"></i>
              <span>Configurações</span>
            </div>

            <div class="user-item" id="btnSair">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span>Sair</span>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <main class="dashboard">
      <aside class="sidebar-communities">
        <div class="sidebar-title">
          <i class="fa-solid fa-people-group"></i>
          Suas Comunidades
        </div>

        <div class="community-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            id="communitySearchInput"
            placeholder="Buscar comunidade..."
          />
        </div>

        <div class="community-list" id="communityList"></div>
      </aside>

      <section class="main-content">
        <div class="create-grid">
          <div class="form-wrapper">
            <header class="form-header">
              <h1>Criar Comunidade</h1>
              <p>Configure seu novo espaço de aprendizado</p>
            </header>

            <form id="communityForm" onsubmit="handleSave(event)">
              <div class="grid-inputs">
                <div class="input-group full-width">
                  <label>Nome da Comunidade</label>
                  <input
                    type="text"
                    id="nameInput"
                    placeholder="Ex: Feras da Bio"
                    maxlength="50"
                  />
                </div>
                
                <div class="input-group full-width">
                  <label>Descrição</label>
                  <textarea
                    id="descInput"
                    rows="3"
                    placeholder="Fale sobre o grupo..."
                  ></textarea>
                </div>
              </div>
              <p id="error-save" class="error-message"></p>
              <button type="submit" class="btn-save" id="btn-save">
                Lançar Comunidade
              </button>
            </form>
          </div>

          <div class="info-side">
            <div class="preview-card">
              <div class="preview-banner"></div>
              <div class="preview-content">
                <div class="preview-avatar">
                  <i class="fa-solid fa-users"></i>
                </div>
                <h4 id="viewName">Nome da Comunidade</h4>
                <p id="viewDesc">Sua descrição aparecerá aqui...</p>
                <div class="view-tags" id="viewTags"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="../../js/api/client.js"></script>
    <script src="../../js/api/services/authService.js"></script>
    <script src="../../js/api/services/communityService.js"></script>
    <script src="../../js/api/services/postService.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
