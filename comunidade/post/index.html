<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen | Comunidade</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="../../css/header.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  </head>
  <body>
    <header class="topbar">
      <div class="brand-side">
        <img src="../../img/LogoLumen2.svg" alt="Lumen Logo" class="logo-img" />
      </div>

      <nav>
        <a href="../../home.html">home</a>
        <a href="/comunidade/" class="active">comunidades</a>
        <a href="../../Agenda.html">agenda</a>
      </nav>

      <div class="divisao-header">
        <div class="pesquisa">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Procurar..." />
        </div>

        <div class="notif">
          <i class="fa-regular fa-bell icon-bell"></i>
          <span class="badge" id="badgeNotif">2</span>
          <div class="dropdown" id="dropdownNotificacao">
            <div class="dropdown-header">Notificações</div>
            <div class="item">
              <span class="dot"></span>
              <p>Alguém curtiu seu conteúdo</p>
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="user-menu">
          <div class="user-trigger">
            <i class="fa-regular fa-circle-user avatar"></i>
            <span class="username">João A B</span>
          </div>
        </div>
      </div>
    </header>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="main-wrapper">
      <div class="container-comunidade">
        

        <main class="feed">
          
          <div class="timeline" id="timeline-posts">
            <div class="comments hidden" id="comments">
              <h2>Comentários</h2>
            

            

            </div>
          </div>
        </main>
   
      </div>
    </div>

    <script src="../../js/api/client.js"></script>
    <script src="../../js/api/services/authService.js"></script>
    <script src="../../js/api/services/communityService.js"></script>
    <script src="../../js/api/services/postService.js"></script>

    <script src="./main.js"></script>
    <script src="../../js/header.js"></script>
  </body>
</html>
